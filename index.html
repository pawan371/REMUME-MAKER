<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ==== HEADER ==== -->
     <h1>Resume Builder</h1>
</hr>
<!--  ==== FORM SECTION START ==== -->
  <h1>Fill Your Details</h1>

  <form>

    <!-- Personal Information -->
     <fieldset>
        <legend>Personal Information</legend>

     <label>Full Name:</label></br>
     <input type="text" name="fullname"></br></br>

    <label>Email:</label></br>
    <input type="text" name="email"></br></br>

    <label>Phone:</label></br>
    <textarea name="address"></textarea></br></br>

    <label>Upload Photo:</label><br>
    <input type="file" name="photo" accept="image/*"></br></br>
     </fieldset>

    </br>

    <!-- Career Objective  -->
     <fieldset>
        <legend>Career Objective</legend>
        <textarea name="objective" rows="4" cols="50"></textarea>
     </fieldset></br>

     <!-- Education  -->
      <fieldset>
        <legend>Education</legend>

        <label>Degree:</label></br>
        <input type="text" name="college"></br></br>

        <label>College/University:</label></br>
        <input type="text" name="year"></br></br>

        <label>Year:</label></br>
        <input type="text" name="year"></br></br>
      </fieldset> </br>

      <!-- Skills -->
       <fieldset>
        <legend>Skills</legend>

        <textarea name="skills" rows="4" cols="50" placeholder="Example: Java, HTML, CSS, React"></textarea>
       </fieldset></br>

       <!-- Projects -->
        <fieldset>
            <legend>Projects</legend>

            <label>p</label>
        </fieldset>
  </form>
    
</body>
<script src="javascript.js"></script>
</html>
